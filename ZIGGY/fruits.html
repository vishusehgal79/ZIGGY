<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ziggy - Fruits</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/swiper@7/swiper-bundle.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>

<header class="header">
  <a href="#" class="logo"><i class="fas fa-shopping-basket"></i> Ziggy</a>
  <nav class="navbar">
    <a href="index.html">home</a>
    <a href="categories.html">categories</a>
    <a href="products.html">products</a>
    <a href="review.html">review</a>
    <a href="recipes.html">recipes</a>
  </nav>

  <div class="icons">
    <div class="fas fa-bars" id="menu-btn"></div>
    <div class="fas fa-search" id="search-btn"></div>
    <a href="cart.html"><div class="fas fa-shopping-cart" id="cart-btn"></div></a>
    <div class="fas fa-user" id="login-btn"></div>
  </div>
</header>

<section class="products">
  <br><br><br><br>
  <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;">
    <h1 class="heading">fruits <span>category</span></h1>
    <a href="categories.html" class="btn" style="margin-top: 1rem;">← Back to Categories</a>
  </div>

  <div class="swiper product-slider">
    <div class="swiper-wrapper">

      <!-- 🍎 Apple -->
      <div class="swiper-slide box">
        <img src="image/apple.jpg" alt="Apple">
        <h3>Apple</h3>
        <div class="price">&#8377 120/-</div>
        <div class="stars">
          <i class="fas fa-star"></i><i class="fas fa-star"></i>
          <i class="fas fa-star"></i><i class="fas fa-star"></i>
          <i class="fas fa-star-half-alt"></i>
        </div>
        <a href="#" class="btn add-to-cart" data-name="Apple" data-price="120" data-image="image/apple.jpg">add to cart</a>
      </div>

      <!-- 🍌 Banana -->
      <div class="swiper-slide box">
        <img src="image/banana.jpg" alt="Banana">
        <h3>Banana</h3>
        <div class="price">&#8377 40/-</div>
        <div class="stars">
          <i class="fas fa-star"></i><i class="fas fa-star"></i>
          <i class="fas fa-star"></i><i class="fas fa-star"></i>
          <i class="fas fa-star-half-alt"></i>
        </div>
        <a href="#" class="btn add-to-cart" data-name="Banana" data-price="40" data-image="image/banana.jpg">add to cart</a>
      </div>

      <!-- 🍋 Lemon -->
      <div class="swiper-slide box">
        <img src="image/lemon.jpg" alt="Lemon">
        <h3>Lemon</h3>
        <div class="price">&#8377 30/-</div>
        <div class="stars">
          <i class="fas fa-star"></i><i class="fas fa-star"></i>
          <i class="fas fa-star"></i><i class="fas fa-star"></i>
          <i class="fas fa-star-half-alt"></i>
        </div>
        <a href="#" class="btn add-to-cart" data-name="Lemon" data-price="30" data-image="image/lemon.jpg">add to cart</a>
      </div>

      <!-- 🥭 Mango -->
      <div class="swiper-slide box">
        <img src="image/mango.jpg" alt="Mango">
        <h3>Mango</h3>
        <div class="price">&#8377 80/-</div>
        <div class="stars">
          <i class="fas fa-star"></i><i class="fas fa-star"></i>
          <i class="fas fa-star"></i><i class="fas fa-star"></i>
          <i class="fas fa-star-half-alt"></i>
        </div>
        <a href="#" class="btn add-to-cart" data-name="Mango" data-price="80" data-image="image/mango.jpg">add to cart</a>
      </div>

    </div>
  </div>
</section>

<section class="footer">
  <div class="credit">© 2025 Ziggy — All rights reserved.</div>
</section>

<!-- JS Swiper Scripts -->
<script src="https://unpkg.com/swiper@7/swiper-bundle.min.js"></script>

<script>
  var swiper = new Swiper(".product-slider", {
    loop: true,
    spaceBetween: 20,
    autoplay: {
      delay: 4000,
      disableOnInteraction: false,
    },
    breakpoints: {
      0: { slidesPerView: 1 },
      576: { slidesPerView: 2 },
      768: { slidesPerView: 3 },
      1024: { slidesPerView: 4 },
    },
  });
</script>

<!-- Firebase + Redirect Script -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    authDomain: "ziggy-70a74.firebaseapp.com",
    projectId: "ziggy-70a74",

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  document.getElementById("login-btn").addEventListener("click", () => {

      }

</script>
<script src="js/script.js"></script>
</body>
</html>
